name: Get FlagCounter Data

on:
  workflow_dispatch:
  page_build:
  schedule:
    - cron: '20 8 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch FlagCounter data
        run: python .github/scripts/fetch_flagcounter_stats.py
        env:
          FLAGCOUNTER_ID: 4jbg
          FLAGCOUNTER_STATS_URL: ${{ secrets.FLAGCOUNTER_STATS_URL }}

      - name: Publish FlagCounter data
        run: |
          mkdir -p flagcounter-results
          cp assets/data/flagcounter.json flagcounter-results/flagcounter.json
          cd flagcounter-results
          git init
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add flagcounter.json
          git diff --cached --quiet && echo "No FlagCounter changes to publish." && exit 0
          git commit -m "Updated FlagCounter Data"
          git push "${remote_repo}" HEAD:flagcounter-stats --force
